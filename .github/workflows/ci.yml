name: CI Pipeline Completo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:

  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Run lint
        run: npm run lint

  test:
    name: 🧪 Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies    
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  summary:
    name: ✅ Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Pipeline result
        run: |
          echo '================================='
          echo '  PIPELINE SUMMARY'
          echo '================================='
          echo '  Lint:  ${{ needs.lint.result }}'
          echo '  Test:  ${{ needs.test.result }}'
          echo '  Build: ${{ needs.build.result }}'
          echo '================================='
          echo '  Commit: ${{ github.sha }}'
          echo '  Branch: ${{ github.ref_name }}'
          echo '  Actor:  ${{ github.actor }}'
          echo '================================='
